services:
  - type: web
    name: tradebot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ACTIVE_BROKER
        value: tv_paper
      - key: MAX_BUDGET
        value: "1000"
